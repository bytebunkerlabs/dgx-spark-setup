# config/prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nvidia_gpu     # GPU: temp, power, SM clock, util (nvidia-smi based)
    static_configs:
      - targets: ['nvidia-gpu-exporter:9835']

  - job_name: node           # host: CPU thermal zones, load, mem (/proc/meminfo), disk
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Uncomment to scrape LiteLLM's metrics endpoint if you enable it:
  # - job_name: litellm
  #   static_configs:
  #     - targets: ['host.docker.internal:4000']
